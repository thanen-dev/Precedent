name: Weekly automated update

on:
  schedule:
    - cron: "0 6 * * 0"   # Sunday 06:00 UTC — scrape before your review session
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  # ── Phase 1: Scrape, extract, queue (fully automatic) ────────────────────────
  scrape-and-queue:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper + extractor + queue pipeline
        run: python scraper/scheduler.py
        continue-on-error: true

      - name: Log queue size
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from tools.queue import list_queue
          p = list_queue('pending')
          print(f'Pending queue items: {len(p)}')
          for t in set(i.get(\"type\") for i in p):
              print(f'  {t}: {sum(1 for i in p if i.get(\"type\")==t)}')
          "

      - name: Generate weekly brief draft
        run: |
          python site/generate_brief.py --draft-only 2>/dev/null || echo "Brief draft skipped (no API key or error)"
        continue-on-error: true

      - name: Commit queue and draft changes
        run: |
          git config user.name  "precedent-bot"
          git config user.email "precedent-bot@users.noreply.github.com"
          git add data/raw/ data/extracted/ data/queue/pending/ site/docs/brief/drafts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly queue update $(date -u +%Y-%m-%d)"
            git push
          fi

  # ── Phase 2: Publish approved items (manual trigger only) ────────────────────
  publish-approved:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Merge approved queue items into profiles
        run: python tools/merge_approved.py

      - name: Run conflict detector
        run: python extractor/conflict_detector.py
        continue-on-error: true

      - name: Run twin matcher
        run: python extractor/twin_matcher.py
        continue-on-error: true

      - name: Build site
        run: python site/build.py --clean

      - name: Commit all published changes
        run: |
          git config user.name  "precedent-bot"
          git config user.email "precedent-bot@users.noreply.github.com"
          git add \
            data/leaders/ \
            data/conflicts/ \
            data/twins/ \
            data/queue/approved/ \
            site/docs/ || true
          git add data/predictions.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to publish."
          else
            git commit -m "chore: publish approved updates $(date -u +%Y-%m-%d)"
            git push
          fi
