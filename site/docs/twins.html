<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twins — PRECEDENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a08;
  --surface:   #0f0f0d;
  --b-dim:     rgba(242,240,235,0.12);
  --b-mid:     rgba(242,240,235,0.28);
  --text:      #f2f0eb;
  --muted:     #8a8880;
  --accent:    #d4930a;
  --danger:    #c0392b;
  --warn:      #d4930a;
  --ok:        #1e6b3c;

  --bebas:  'Bebas Neue', 'Arial Narrow', sans-serif;
  --mono:   'IBM Plex Mono', monospace;
  --sans:   'IBM Plex Sans', system-ui, sans-serif;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.6;
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }
a:hover { color: var(--accent); }

/* ── masthead ── */
.masthead {
  border-bottom: 1px solid var(--b-mid);
  padding: 0 3rem;
}

.masthead-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 2rem 0 0.75rem;
  border-bottom: 1px solid var(--b-dim);
}

.masthead-wordmark {
  font-family: var(--bebas);
  font-size: clamp(3.5rem, 6vw, 4.5rem);
  line-height: 1;
  color: var(--text);
  letter-spacing: 0.04em;
}

.masthead-tagline {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding-bottom: 0.5rem;
}

.masthead-nav {
  display: flex;
  gap: 0;
  padding: 0.5rem 0;
}

.masthead-nav a {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0.35rem 1rem;
  border-right: 1px solid var(--b-dim);
  transition: color 0.1s;
}

.masthead-nav a:first-child { padding-left: 0; }
.masthead-nav a:last-child { border-right: none; }
.masthead-nav a:hover,
.masthead-nav a.active { color: var(--text); }
.masthead-nav a.active {
  color: var(--accent);
  border-bottom: 1px solid var(--accent);
  margin-bottom: -1px;
}

/* ── layout ── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 3rem;
}

/* ── section label ── */
.section-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.section-marker {
  color: var(--accent);
  margin-right: 0.4rem;
}

/* ── display heading ── */
h1 {
  font-family: var(--bebas);
  font-size: clamp(2.5rem, 4vw, 3.5rem);
  font-weight: 400;
  letter-spacing: 0.05em;
  line-height: 1;
  margin-bottom: 2rem;
}

h2 {
  font-family: var(--bebas);
  font-size: 1.5rem;
  letter-spacing: 0.04em;
  font-weight: 400;
  line-height: 1;
}

h3 {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

/* ── stat block ── */
.stat-row {
  display: flex;
  gap: 0;
  border: 1px solid var(--b-mid);
  margin-bottom: 3rem;
}

.stat-cell {
  flex: 1;
  padding: 1.25rem 1.75rem;
  border-right: 1px solid var(--b-dim);
}

.stat-cell:last-child { border-right: none; }

.stat-value {
  font-family: var(--bebas);
  font-size: 2.75rem;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 0.25rem;
}

.stat-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── leader row (accordion) ── */
.leader-row {
  border-left: 3px solid var(--accent);
  border-bottom: 1px solid var(--b-dim);
  margin-bottom: 0;
}

.leader-row:last-child { border-bottom: 1px solid var(--b-mid); }

.leader-row-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.75rem 1.25rem 1.5rem;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}

.leader-row-header:hover { background: rgba(212,147,10,0.04); }

.leader-row-meta {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
}

.leader-name {
  font-family: var(--bebas);
  font-size: 1.75rem;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1;
}

.leader-title-tag {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.leader-row-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.completeness-display {
  text-align: right;
}

.completeness-frac {
  font-family: var(--bebas);
  font-size: 1.25rem;
  color: var(--accent);
  line-height: 1;
}

.completeness-sub {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.expand-arrow {
  font-size: 0.875rem;
  color: var(--muted);
  width: 1rem;
  text-align: center;
  transition: transform 0.15s;
}

/* ── dimension table ── */
.leader-detail {
  display: none;
  border-top: 1px solid var(--b-dim);
  padding: 0 1.75rem 1.5rem 1.5rem;
}

.dim-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1.5rem;
}

.dim-table th {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: left;
  padding: 0.75rem 0.75rem 0.75rem 0;
  border-bottom: 1px solid var(--b-mid);
}

.dim-table td {
  font-size: 0.8125rem;
  padding: 0.875rem 0.75rem 0.875rem 0;
  border-bottom: 1px solid var(--b-dim);
  vertical-align: top;
}

.dim-table tr:last-child td { border-bottom: none; }

.dim-name-cell {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.06em;
  color: var(--accent);
  white-space: nowrap;
  width: 22%;
}

.dim-position-cell { width: 46%; }
.dim-position-cell.empty { color: var(--muted); font-style: italic; }

.conf-cell { width: 12%; white-space: nowrap; }
.conf-bar-wrap {
  height: 2px;
  background: var(--b-mid);
  margin-top: 0.4rem;
  width: 100%;
}
.conf-bar-fill { height: 2px; background: var(--accent); }
.conf-val {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
}

.source-cell {
  width: 20%;
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}

.source-cell a { color: var(--muted); }
.source-cell a:hover { color: var(--accent); }

/* ── blockquote ── */
blockquote {
  border-left: 2px solid var(--accent);
  padding: 0.75rem 1rem;
  margin: 1rem 0;
  color: var(--muted);
  font-size: 0.875rem;
  font-style: italic;
}

blockquote .bq-source {
  display: block;
  font-style: normal;
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  margin-top: 0.4rem;
}

blockquote .bq-source a { color: var(--muted); }
blockquote .bq-source a:hover { color: var(--accent); }

/* ── synthesis block ── */
.synthesis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border: 1px solid var(--b-dim);
  margin-top: 1rem;
}

.synth-cell {
  padding: 1rem 1.25rem;
  border-right: 1px solid var(--b-dim);
  border-bottom: 1px solid var(--b-dim);
}

.synth-cell:nth-child(2n) { border-right: none; }
.synth-cell:nth-last-child(-n+2) { border-bottom: none; }

.synth-dim {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.35rem;
}

.synth-insight { font-size: 0.8rem; color: var(--muted); }

/* ── badges / pills ── */
.pill {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.2em 0.55em;
  border-radius: 2px;
  vertical-align: middle;
}

.pill-high    { background: rgba(192,57,43,0.18);   color: #e74c3c; border: 1px solid rgba(192,57,43,0.4); }
.pill-medium  { background: rgba(212,147,10,0.15);  color: #d4930a; border: 1px solid rgba(212,147,10,0.4); }
.pill-low     { background: rgba(30,107,60,0.18);   color: #2ecc71; border: 1px solid rgba(30,107,60,0.4); }
.pill-primary { background: rgba(212,147,10,0.12);  color: var(--accent); border: 1px solid rgba(212,147,10,0.3); }
.pill-muted   { background: rgba(242,240,235,0.06); color: var(--muted);  border: 1px solid var(--b-dim); }

/* ── case blocks ── */
.filter-bar {
  display: flex;
  gap: 0;
  margin-bottom: 2rem;
  border: 1px solid var(--b-mid);
  width: fit-content;
}

.filter-btn {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  background: none;
  border: none;
  border-right: 1px solid var(--b-dim);
  padding: 0.5rem 1rem;
  cursor: pointer;
  transition: color 0.1s, background 0.1s;
}

.filter-btn:last-child { border-right: none; }
.filter-btn:hover { color: var(--text); background: rgba(242,240,235,0.04); }
.filter-btn.active { color: var(--accent); background: rgba(212,147,10,0.08); }

.case-block {
  border: 1px solid var(--b-dim);
  border-left: 3px solid var(--b-mid);
  margin-bottom: 1rem;
}

.case-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1.5rem;
  align-items: start;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--b-dim);
  background: var(--surface);
}

.case-id-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.3rem;
}

.case-country {
  font-family: var(--bebas);
  font-size: 1.375rem;
  letter-spacing: 0.05em;
  line-height: 1;
}

.case-period-tag {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--muted);
  margin-top: 0.25rem;
}

.case-body {
  padding: 1.25rem 1.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

.case-section h3 { margin-bottom: 0.4rem; }
.case-section p { font-size: 0.8125rem; color: var(--muted); }

.case-mechanisms {
  padding: 0 1.5rem 1.25rem;
}

.case-mechanisms ul {
  list-style: none;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.35rem;
}

.case-mechanisms ul li {
  font-size: 0.75rem;
  color: var(--muted);
  padding-left: 1rem;
  position: relative;
}

.case-mechanisms ul li::before {
  content: "→";
  position: absolute;
  left: 0;
  color: var(--accent);
  font-family: var(--mono);
}

.case-lesson {
  border-top: 1px solid var(--b-dim);
  padding: 1rem 1.5rem;
  background: rgba(212,147,10,0.04);
  font-size: 0.8125rem;
}

.case-lesson strong {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  display: block;
  margin-bottom: 0.35rem;
}

/* ── twin match ── */
.twin-block {
  border: 1px solid var(--b-dim);
  margin-bottom: 1.5rem;
}

.twin-signal {
  background: var(--surface);
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--b-dim);
}

.twin-signal-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.twin-signal-text {
  font-size: 0.9rem;
  font-style: italic;
  color: var(--muted);
}

.twin-matches { display: grid; grid-template-columns: 1fr 1fr; }

.twin-match-card {
  padding: 1.25rem 1.5rem;
  border-right: 1px solid var(--b-dim);
}

.twin-match-card:last-child { border-right: none; }

.twin-score {
  font-family: var(--bebas);
  font-size: 3rem;
  color: var(--accent);
  line-height: 1;
}

.twin-score-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
}

.twin-match-country {
  font-family: var(--bebas);
  font-size: 1.25rem;
  letter-spacing: 0.04em;
  margin-bottom: 0.25rem;
}

.twin-section { margin-top: 0.75rem; }
.twin-section h3 { margin-bottom: 0.25rem; }
.twin-section p { font-size: 0.8rem; color: var(--muted); }

/* ── conflict block ── */
.conflict-block {
  border: 1px solid var(--b-dim);
  border-left: 3px solid var(--danger);
  margin-bottom: 1.25rem;
}

.conflict-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.875rem 1.25rem;
  background: var(--surface);
  border-bottom: 1px solid var(--b-dim);
}

.conflict-dim-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
}

.conflict-leaders-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--b-dim);
}

.conflict-side {
  padding: 1.25rem 1.5rem;
  border-right: 1px solid var(--b-dim);
}

.conflict-side:last-child { border-right: none; }

.conflict-leader-name {
  font-family: var(--bebas);
  font-size: 1.25rem;
  letter-spacing: 0.04em;
  margin-bottom: 0.5rem;
}

.conflict-pos { font-size: 0.8125rem; margin-bottom: 0.5rem; }

.conflict-footer {
  padding: 1rem 1.5rem;
}

.conflict-footer h3 { margin-bottom: 0.4rem; }
.conflict-footer p { font-size: 0.8125rem; color: var(--muted); }

.prediction-block {
  border-top: 1px solid var(--b-dim);
  padding-top: 0.75rem;
  margin-top: 0.75rem;
}

/* ── index quick-links ── */
.index-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border: 1px solid var(--b-mid);
  margin-top: 3rem;
}

.index-tile {
  padding: 1.5rem;
  border-right: 1px solid var(--b-dim);
  transition: background 0.1s;
}

.index-tile:last-child { border-right: none; }
.index-tile:hover { background: rgba(242,240,235,0.02); }

.index-tile-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.6rem;
}

.index-tile-body {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.5;
}

.index-tile a.tile-link {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-top: 0.75rem;
  text-transform: uppercase;
}

.index-tile a.tile-link:hover { color: var(--accent); }

/* ── empty state ── */
.empty-state {
  padding: 4rem 2rem;
  text-align: center;
  border: 1px dashed var(--b-mid);
  color: var(--muted);
}

.empty-state code {
  display: block;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: rgba(212,147,10,0.6);
  margin-top: 1rem;
}

/* ── divider ── */
.rule { border: none; border-top: 1px solid var(--b-dim); margin: 2rem 0; }

/* ── mobile ── */
@media (max-width: 700px) {
  .masthead { padding: 0 1.25rem; }
  .container { padding: 2rem 1.25rem; }
  .masthead-top { flex-direction: column; gap: 0.5rem; }
  .masthead-nav { flex-wrap: wrap; }
  .stat-row { flex-direction: column; }
  .stat-cell { border-right: none; border-bottom: 1px solid var(--b-dim); }
  .case-body { grid-template-columns: 1fr; }
  .case-mechanisms ul { grid-template-columns: 1fr; }
  .twin-matches { grid-template-columns: 1fr; }
  .conflict-leaders-grid { grid-template-columns: 1fr; }
  .index-grid { grid-template-columns: 1fr; }
  .synthesis-grid { grid-template-columns: 1fr; }
  .leader-row-meta { flex-direction: column; gap: 0.25rem; }
  .dim-table { font-size: 0.75rem; }
}
</style>
</head>
<body>
<header class="masthead">
  <div class="masthead-top">
    <a href="index.html" class="masthead-wordmark">PRECEDENT</a>
    <div class="masthead-tagline">Political intelligence — Cambodia's decision-makers</div>
  </div>
  <nav class="masthead-nav"><a href="index.html" class="">Index</a><a href="leaders.html" class="">Leaders</a><a href="cases.html" class="">Cases</a><a href="twins.html" class="active">Twins</a><a href="conflicts.html" class="">Conflicts</a><a href="solutions.html" class="">Solutions</a></nav>
</header>
<div class="container">
  <div class="section-label"><span class="section-marker">◈</span>Structural twins</div>
  <h1>Twin Matches</h1>
  <div class="empty-state">
    <p>No twin matches yet.</p>
    <code>python extractor/twin_matcher.py "signal text" --leader hun_manet</code>
  </div>
</div>

</body>
</html>
